<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evrima Soundboard | Noobz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background-color: #1a2520; min-height: 100vh; transition: background-color 0.3s ease; }
        body { color: #d8e3dd; font-family: 'Century Gothic', 'Segoe UI', Arial, sans-serif; font-size: 13px; padding: 15px; }

        .discord-banner { background-color: #131b17; border: 1px solid #23332c; border-radius: 8px; padding: 12px 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .tab-btn { background-color: #141d19; border: 1px solid #23332c; color: #728f80; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { background-color: #27a35b; color: #ffffff; }
        .tab-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .controls-bar { background-color: #141d19; border: 1px solid #23332c; border-radius: 8px; padding: 10px 20px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; }
        
        .soundboard-grid { display: flex; align-items: flex-start; gap: 15px; width: 100%; flex-wrap: wrap; }
        .column-wrapper { flex: 1; min-width: 300px; background-color: #141d19; border: 1px solid #23332c; border-radius: 12px; padding: 15px; }
        .column-title { font-size: 16px; font-weight: bold; text-align: center; padding: 10px; margin-bottom: 10px; border-radius: 8px; text-transform: uppercase; background: #23332c; }

        .dino-card { margin-bottom: 8px; border-radius: 8px; overflow: hidden; border: 2px solid #283a32; transition: all 0.3s ease; }
        .dino-toggle { width: 100%; background: none; border: none; color: #fff; padding: 10px; text-align: left; font-weight: bold; cursor: pointer; }
        .dino-panel { display: none; padding: 10px; }
        .dino-card.active .dino-panel { display: block; }
        .call-btn { background: #25382e; border: 1px solid #2e4539; color: #4ade80; padding: 4px 10px; cursor: pointer; margin: 2px; }

        /* 🟢 DIET COLOR PALETTES */
        .herb .dino-toggle { background: #213029; }
        .herb.recent-1 .dino-toggle { background: #316b46 !important; }
        .herb .dino-panel { background: #16201b; }

        .carn .dino-toggle { background: #302121; }
        .carn.recent-1 .dino-toggle { background: #4a2727 !important; }
        .carn .dino-panel { background: #201616; }

        .omni .dino-toggle { background: #282130; }
        .omni.recent-1 .dino-toggle { background: #472a5a !important; }
        .omni .dino-panel { background: #1c1620; }

        body.dark-mode { background-color: #000; }
        body.dark-mode .column-wrapper, body.dark-mode .controls-bar, body.dark-mode .tab-btn { background-color: #080c0a; }

        @media (max-width: 768px) { .soundboard-grid { flex-direction: column; } }
    </style>
</head>
<body>

<div class="discord-banner">
    <div class="discord-text">Noobz Evrima Utility</div>
    <a href="https://discord.gg/Noobz" class="discord-link">Join Discord</a>
</div>

<div class="tab-container">
    <button class="tab-btn active" id="tab-soundboard">Soundboard</button>
    <button class="tab-btn" id="tab-quiz">Training Quiz</button>
</div>

<div id="soundboard-view" class="view-section active">
    <div class="controls-bar">
        <label>Volume <input type="range" id="masterVolume" min="0" max="1" step="0.01" value="0.5"></label>
        <label><input type="checkbox" id="darkModeToggle"> Dark Mode</label>
    </div>
    <div class="soundboard-grid" id="main-grid">
        <div class="column-wrapper" id="herb-container"><div class="column-title">Herbivores</div></div>
        <div class="column-wrapper" id="carn-container"><div class="column-title">Carnivores</div></div>
        <div class="column-wrapper" id="omni-container"><div class="column-title">Omnivores</div></div>
    </div>
</div>

<script>
    const dinos = { 
        herbs: ["Diablo", "Dryo", "Hypsi", "Maia", "Pachy", "Stego", "Tenno", "Trike"], 
        carns: ["Allo", "Carno", "Cerato", "Deino", "Dilo", "Herrera", "Omni", "Ptera", "Rex", "Troodon"], 
        omnis: ["Beipi", "Galli"] 
    };
    
    let openCards = { herb: [], carn: [], omni: [] };

    // Builder
    Object.keys(dinos).forEach(type => {
        const diet = type.replace('s', '');
        const container = document.getElementById(diet + '-container');
        dinos[type].forEach(name => {
            const card = document.createElement('div');
            card.className = `dino-card ${diet}`;
            card.innerHTML = `<button class="dino-toggle">${name}</button><div class="dino-panel"><button class="call-btn" onclick="new Audio('audio/${name} 75 1 Call.mp3').play()">Call 1</button></div>`;
            card.querySelector('.dino-toggle').onclick = () => {
                if (card.classList.contains('active')) {
                    card.classList.remove('active', 'recent-1');
                    openCards[diet] = openCards[diet].filter(c => c !== card);
                } else {
                    if (openCards[diet].length >= 3) openCards[diet].shift().classList.remove('active', 'recent-1');
                    openCards[diet].push(card);
                    card.classList.add('active', 'recent-1');
                }
            };
            container.appendChild(card);
        });
    });

    document.getElementById('darkModeToggle').addEventListener('change', e => document.body.classList.toggle('dark-mode', e.target.checked));
</script>
</body>
</html>
