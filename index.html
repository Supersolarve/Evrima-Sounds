<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evrima Soundboard | Noobz</title>
    <style>
        /* Global Theme */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Dark background, full height */
        html, body { background-color: #1a2520; min-height: 100vh; transition: background-color 0.3s ease; }
        body { color: #d8e3dd; font-family: 'Century Gothic', 'Segoe UI', Arial, sans-serif; font-size: 13px; padding: 15px; }

        /* Banner & Tabs */
        .discord-banner { background-color: #131b17; border: 1px solid #23332c; border-radius: 8px; padding: 12px 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background-color: #141d19; border: 1px solid #23332c; color: #728f80; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { background-color: #27a35b; color: #ffffff; }
        .tab-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Controls */
        .controls-bar { background-color: #141d19; border: 1px solid #23332c; border-radius: 8px; padding: 10px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .volume-slider { flex-grow: 1; max-width: 250px; cursor: pointer; accent-color: #4ade80; }
        .toggle-wrapper { display: flex; align-items: center; gap: 10px; }
        .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
        .switch input { opacity: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #23332c; border-radius: 34px; transition: .3s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: #728f80; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background-color: #4ade80; }
        input:checked + .slider:before { transform: translateX(16px); background-color: #1a2520; }

        /* Grid - Fixed Desktop Wrapping */
        .soundboard-grid { display: flex; align-items: flex-start; gap: 15px; width: 100%; max-width: 1400px; margin: 0 auto; flex-wrap: wrap; }
        .column-wrapper { flex: 1; min-width: 300px; height: auto; max-height: 80vh; overflow-y: auto; background-color: #141d19; border: 1px solid #23332c; border-radius: 12px; padding: 15px; }
        
        .column-title { font-size: 16px; font-weight: bold; text-align: center; padding: 10px; margin-bottom: 10px; border-radius: 8px; text-transform: uppercase; background: #23332c; }

        /* Cards & Buttons */
        .dino-card { background-color: #1b2822; margin-bottom: 8px; border-radius: 8px; overflow: hidden; border: 1px solid #283a32; }
        .dino-toggle { width: 100%; background: none; border: none; color: #fff; padding: 10px; text-align: left; font-weight: bold; cursor: pointer; }
        .dino-panel { display: none; padding: 10px; background: #16201b; }
        .dino-card.active .dino-panel { display: block; }
        .call-btn { background: #25382e; border: 1px solid #2e4539; color: #4ade80; padding: 4px 10px; cursor: pointer; }

        /* OLED Dark Mode Overrides */
        body.dark-mode { background-color: #000; }
        body.dark-mode .column-wrapper, body.dark-mode .controls-bar { background-color: #080c0a; border-color: #141d19; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .soundboard-grid { flex-direction: column; }
            .column-wrapper { width: 100%; max-height: none; }
        }
    </style>
</head>
<body>

<div class="discord-banner">
    <div class="discord-text">Noobz Utility</div>
    <a href="https://discord.gg/Noobz" target="_blank" class="discord-link">Join Discord</a>
</div>

<div class="tab-container">
    <button class="tab-btn active" id="tab-soundboard">Soundboard</button>
    <button class="tab-btn" id="tab-quiz">Training Quiz</button>
</div>

<div id="soundboard-view" class="view-section active">
    <div class="controls-bar">
        <div><label>Volume</label> <input type="range" id="masterVolume" class="volume-slider" min="0" max="1" step="0.01" value="0.5"></div>
        <div class="toggle-wrapper"><label>Dark Mode</label> <label class="switch"><input type="checkbox" id="darkModeToggle"><span class="slider"></span></label></div>
        <div class="toggle-wrapper"><label>Party Mode</label> <label class="switch"><input type="checkbox" id="partyModeToggle"><span class="slider"></span></label></div>
    </div>
    <div class="soundboard-grid" id="main-grid">
        <div class="column-wrapper herb-column" id="herb-container"><div class="column-title">Herbivores</div></div>
        <div class="column-wrapper carn-column" id="carn-container"><div class="column-title">Carnivores</div></div>
        <div class="column-wrapper omni-column" id="omni-container"><div class="column-title">Omnivores</div></div>
    </div>
</div>

<script>
    const dinos = { herbs: ["Diablo", "Dryo", "Hypsi", "Maia", "Pachy", "Stego", "Tenno", "Trike"], carns: ["Allo", "Carno", "Cerato", "Deino", "Dilo", "Herrera", "Omni", "Ptera", "Rex", "Troodon"], omnis: ["Beipi", "Galli"] };
    const DOM = { mainGrid: document.getElementById('main-grid'), darkModeToggle: document.getElementById('darkModeToggle'), partyToggle: document.getElementById('partyModeToggle') };

    // Dark Mode
    DOM.darkModeToggle.addEventListener('change', e => document.body.classList.toggle('dark-mode', e.target.checked));

    // Party Mode
    let partyInterval = null;
    DOM.partyToggle.addEventListener('change', e => {
        if (e.target.checked) partyInterval = setInterval(() => { new Audio('audio/Rex 75 1 Call.mp3').play(); }, 1000);
        else clearInterval(partyInterval);
    });

    // Build UI
    ['herb', 'carn', 'omni'].forEach(t => {
        dinos[t + 's'].forEach(d => {
            const card = document.createElement('div');
            card.className = 'dino-card';
            card.innerHTML = `<button class="dino-toggle">${d}</button><div class="dino-panel"><button class="call-btn" onclick="new Audio('audio/${d} 75 1 Call.mp3').play()">Call 1</button></div>`;
            card.querySelector('.dino-toggle').onclick = () => card.classList.toggle('active');
            document.getElementById(t + '-container').appendChild(card);
        });
    });
</script>
</body>
</html>
