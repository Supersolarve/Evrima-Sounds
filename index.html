<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evrima Soundboard | Noobz</title>
    <style>
        /* Global Theme */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background-color: #1a2520; min-height: 100vh; transition: background-color 0.3s ease; }
        body { color: #d8e3dd; font-family: 'Century Gothic', 'Segoe UI', Arial, sans-serif; font-size: 13px; padding: 15px; overflow-x: hidden; }

        /* Banner */
        .discord-banner { background-color: #131b17; border: 1px solid #23332c; border-radius: 8px; padding: 12px 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .discord-link { background-color: #27a35b; color: #ffffff; text-decoration: none; padding: 6px 14px; border-radius: 6px; font-weight: bold; }

        /* Tab Navigation */
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background-color: #141d19; border: 1px solid #23332c; color: #728f80; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { background-color: #27a35b; color: #ffffff; }

        /* Views */
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Controls */
        .controls-bar { background-color: #141d19; border: 1px solid #23332c; border-radius: 8px; padding: 10px 20px; margin-bottom: 20px; display: flex; gap: 15px; }

        /* Grid */
        .soundboard-grid { display: flex; align-items: flex-start; gap: 15px; width: 100%; flex-wrap: wrap; }
        .column-wrapper { flex: 1; min-width: 300px; background-color: #141d19; border: 1px solid #23332c; border-radius: 12px; padding: 10px; }
        
        /* Dino Cards */
        .dino-card { margin-bottom: 8px; border-radius: 8px; overflow: hidden; border: 2px solid #283a32; }
        
        /* 🟢 DIET COLORS (Applied to Toggle & Panel) */
        .herb .dino-toggle { background-color: #213029; }
        .herb .dino-panel { background-color: #16201b; }
        
        .carn .dino-toggle { background-color: #302121; }
        .carn .dino-panel { background-color: #201616; }
        
        .omni .dino-toggle { background-color: #282130; }
        .omni .dino-panel { background-color: #1c1620; }

        .dino-toggle { width: 100%; border: none; color: #ffffff; padding: 10px; text-align: left; font-weight: bold; cursor: pointer; }
        .dino-card.active .dino-panel { display: block; }
        .call-btn { background: #25382e; color: #4ade80; padding: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="discord-banner">
    <div>Noobz Evrima Utility</div>
    <a href="https://discord.gg/Noobz" class="discord-link">Join Discord</a>
</div>

<div class="tab-container">
    <button class="tab-btn active" id="tab-soundboard">Soundboard</button>
    <button class="tab-btn" id="tab-quiz">Training Quiz</button>
</div>

<div id="soundboard-view" class="view-section active">
    <div class="controls-bar">
        <label>Volume <input type="range" id="masterVolume" min="0" max="1" step="0.01" value="0.5"></label>
    </div>
    <div class="soundboard-grid" id="main-grid">
        <div class="column-wrapper" id="herb-container"><div class="column-title">Herbivores</div></div>
        <div class="column-wrapper" id="carn-container"><div class="column-title">Carnivores</div></div>
        <div class="column-wrapper" id="omni-container"><div class="column-title">Omnivores</div></div>
    </div>
</div>

<script>
    const dinos = {
        herbs: ["Diablo", "Dryo", "Hypsi", "Maia", "Pachy", "Stego", "Tenno", "Trike"],
        carns: ["Allo", "Carno", "Cerato", "Deino", "Dilo", "Herrera", "Omni", "Ptera", "Rex", "Troodon"],
        omnis: ["Beipi", "Galli"]
    };

    function buildCards(dinoList, containerId, dietClass) {
        const container = document.getElementById(containerId);
        dinoList.forEach(name => {
            const card = document.createElement('div');
            // This class application fixes the green screen issue
            card.className = `dino-card ${dietClass}`;
            card.innerHTML = `<button class="dino-toggle">${name}</button><div class="dino-panel"><button class="call-btn">Call 1</button></div>`;
            card.querySelector('.dino-toggle').onclick = () => card.classList.toggle('active');
            container.appendChild(card);
        });
    }

    buildCards(dinos.herbs, 'herb-container', 'herb');
    buildCards(dinos.carns, 'carn-container', 'carn');
    buildCards(dinos.omnis, 'omni-container', 'omni');
    
    // Tab Logic
    document.getElementById('tab-soundboard').onclick = () => {
        document.getElementById('soundboard-view').classList.add('active');
        document.getElementById('quiz-view').classList.remove('active');
    };
    document.getElementById('tab-quiz').onclick = () => {
        document.getElementById('soundboard-view').classList.remove('active');
        document.getElementById('quiz-view').classList.add('active');
    };
</script>
</body>
</html>
