<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evrima Soundboard | Noobz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #1a2520; color: #d8e3dd; font-family: sans-serif; padding: 15px; transition: background 0.3s; }
        body.dark-mode { background-color: #000; }
        
        /* Banner & Tabs */
        .discord-banner { background: #131b17; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .tab-btn { background: #141d19; border: 1px solid #23332c; color: #728f80; padding: 10px; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { background: #27a35b; color: #fff; }
        .tab-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Controls */
        .controls-bar { background: #141d19; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; }

        /* Grid */
        .soundboard-grid { display: flex; gap: 15px; flex-wrap: wrap; }
        .column-wrapper { flex: 1; min-width: 300px; background: #141d19; padding: 15px; border-radius: 12px; }
        .column-title { background: #23332c; padding: 10px; text-align: center; text-transform: uppercase; margin-bottom: 10px; border-radius: 8px; }

        /* Cards & Border Logic */
        .dino-card { background: #1b2822; margin-bottom: 8px; border: 2px solid #283a32; border-radius: 8px; transition: border 0.3s; }
        .dino-card.recent-1 { border-color: #4ade80 !important; }
        .dino-card.recent-2 { border-color: #27a35b !important; }
        .dino-card.recent-3 { border-color: #1f8549 !important; }
        .dino-toggle { width: 100%; background: none; border: none; color: #fff; padding: 10px; text-align: left; font-weight: bold; cursor: pointer; }
        .dino-panel { display: none; padding: 10px; background: #16201b; }
        .dino-card.active .dino-panel { display: block; }
        
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body>

<div class="discord-banner">
    <div>Noobz Evrima Utility</div>
    <a href="https://discord.gg/Noobz" style="color:#27a35b; font-weight:bold; text-decoration:none;">Join Discord</a>
</div>

<div class="tab-container">
    <button class="tab-btn active" id="tab-soundboard">Soundboard</button>
    <button class="tab-btn" id="tab-quiz">Training Quiz</button>
</div>

<div id="soundboard-view" class="view-section active">
    <div class="controls-bar">
        <label>Vol <input type="range" id="masterVolume" min="0" max="1" step="0.01" value="0.5"></label>
        <label><input type="checkbox" id="darkModeToggle"> Dark Mode</label>
        <label><input type="checkbox" id="partyToggle"> Party Mode</label>
    </div>
    <div class="soundboard-grid" id="main-grid">
        <div class="column-wrapper" id="herb-container"><div class="column-title">Herbivores</div></div>
        <div class="column-wrapper" id="carn-container"><div class="column-title">Carnivores</div></div>
        <div class="column-wrapper" id="omni-container"><div class="column-title">Omnivores</div></div>
    </div>
</div>

<div id="quiz-view" class="view-section">
    <div style="color:white; text-align:center; padding:50px;">
        <h2>Training Quiz Active</h2>
        <button id="finishQuizBtn" style="padding:10px; cursor:pointer;">Simulate Finish Quiz</button>
    </div>
</div>

<script>
    const dinos = { 
        herbs: ["Diablo", "Dryo", "Hypsi", "Maia", "Pachy", "Stego", "Tenno", "Trike"], 
        carns: ["Allo", "Carno", "Cerato", "Deino", "Dilo", "Herrera", "Omni", "Ptera", "Rex", "Troodon"], 
        omnis: ["Beipi", "Galli"] 
    };

    let isQuizActive = false; // The Master Lock
    let openCards = { herb: [], carn: [], omni: [] };

    // --- Tab Switcher ---
    function switchTab(tab) {
        if (isQuizActive && tab === 'soundboard') return alert("Finish the quiz first!");
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'tab-' + tab));
        document.querySelectorAll('.view-section').forEach(v => v.classList.toggle('active', v.id === tab + '-view'));
    }
    document.getElementById('tab-soundboard').onclick = () => switchTab('soundboard');
    document.getElementById('tab-quiz').onclick = () => {
        isQuizActive = true; 
        document.getElementById('tab-soundboard').disabled = true;
        switchTab('quiz');
    };
    document.getElementById('finishQuizBtn').onclick = () => {
        isQuizActive = false;
        document.getElementById('tab-soundboard').disabled = false;
        switchTab('soundboard');
    };

    // --- Build Dinos ---
    Object.keys(dinos).forEach(type => {
        const container = document.getElementById(type.replace('s', '') + '-container');
        dinos[type].forEach(name => {
            const card = document.createElement('div');
            card.className = 'dino-card';
            card.innerHTML = `<button class="dino-toggle">${name}</button><div class="dino-panel"><button class="call-btn">Play Call</button></div>`;
            
            card.querySelector('.dino-toggle').onclick = () => {
                const colId = type.replace('s', '');
                if (card.classList.contains('active')) {
                    card.classList.remove('active', 'recent-1', 'recent-2', 'recent-3');
                    openCards[colId] = openCards[colId].filter(c => c !== card);
                } else {
                    if (openCards[colId].length >= 3) {
                        const oldest = openCards[colId].shift();
                        oldest.classList.remove('active', 'recent-1', 'recent-2', 'recent-3');
                    }
                    openCards[colId].push(card);
                    card.classList.add('active');
                }
                openCards[colId].forEach((c, idx) => {
                    c.classList.remove('recent-1', 'recent-2', 'recent-3');
                    c.classList.add(`recent-${openCards[colId].length - idx}`);
                });
            };
            container.appendChild(card);
        });
    });

    document.getElementById('darkModeToggle').addEventListener('change', e => document.body.classList.toggle('dark-mode', e.target.checked));
</script>
</body>
</html>
