<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evrima Soundboard | Noobz</title>
    <style>
        /* Global Theme */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background-color: #1a2520; min-height: 100vh; transition: background-color 0.3s ease; }
        body { color: #d8e3dd; font-family: 'Century Gothic', 'Segoe UI', Arial, sans-serif; font-size: 13px; padding: 15px; }

        /* Banner & Tabs */
        .discord-banner { background-color: #131b17; border: 1px solid #23332c; border-radius: 8px; padding: 12px 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .discord-link { background-color: #27a35b; color: #ffffff; text-decoration: none; padding: 6px 14px; border-radius: 6px; font-weight: bold; }
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background-color: #141d19; border: 1px solid #23332c; color: #728f80; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { background-color: #27a35b; color: #ffffff; }
        .tab-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Controls */
        .controls-bar { background-color: #141d19; border: 1px solid #23332c; border-radius: 8px; padding: 10px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .toggle-wrapper { display: flex; align-items: center; gap: 10px; }
        .switch { position: relative; width: 36px; height: 20px; }
        .switch input { opacity: 0; }
        .slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: #23332c; border-radius: 34px; transition: .3s; }
        input:checked + .slider { background-color: #4ade80; }

        /* Grid */
        .soundboard-grid { display: flex; align-items: flex-start; gap: 15px; width: 100%; flex-wrap: wrap; }
        .column-wrapper { flex: 1; min-width: 300px; background-color: #141d19; border: 1px solid #23332c; border-radius: 12px; padding: 15px; }
        .column-title { font-size: 16px; font-weight: bold; text-align: center; padding: 10px; margin-bottom: 10px; border-radius: 8px; text-transform: uppercase; background: #23332c; }

        /* Cards */
        .dino-card { background-color: #1b2822; margin-bottom: 8px; border-radius: 8px; overflow: hidden; border: 1px solid #283a32; }
        .dino-toggle { width: 100%; background: none; border: none; color: #fff; padding: 10px; text-align: left; font-weight: bold; cursor: pointer; }
        .dino-panel { display: none; padding: 10px; background: #16201b; }
        .dino-card.active .dino-panel { display: block; }
        .call-btn { background: #25382e; border: 1px solid #2e4539; color: #4ade80; padding: 4px 10px; cursor: pointer; margin: 2px; }

        /* Dark Mode */
        body.dark-mode { background-color: #000; }
        body.dark-mode .column-wrapper, body.dark-mode .controls-bar, body.dark-mode .tab-btn { background-color: #080c0a; }

        @media (max-width: 768px) { .soundboard-grid { flex-direction: column; } }
    </style>
</head>
<body>

<div class="discord-banner">
    <div class="discord-text">Noobz Evrima Utility</div>
    <a href="https://discord.gg/Noobz" target="_blank" class="discord-link">Join Discord</a>
</div>

<div class="tab-container">
    <button class="tab-btn active" id="tab-soundboard">Soundboard</button>
    <button class="tab-btn" id="tab-quiz">Training Quiz</button>
</div>

<div id="soundboard-view" class="view-section active">
    <div class="controls-bar">
        <div><label>Volume</label> <input type="range" id="masterVolume" min="0" max="1" step="0.01" value="0.5"></div>
        <div class="toggle-wrapper"><label>Dark Mode</label> <label class="switch"><input type="checkbox" id="darkModeToggle"><span class="slider"></span></label></div>
        <div class="toggle-wrapper"><label>Party Mode</label> <label class="switch"><input type="checkbox" id="partyToggle"><span class="slider"></span></label></div>
    </div>
    <div class="soundboard-grid" id="main-grid">
        <div class="column-wrapper" id="herb-container"><div class="column-title">Herbivores</div></div>
        <div class="column-wrapper" id="carn-container"><div class="column-title">Carnivores</div></div>
        <div class="column-wrapper" id="omni-container"><div class="column-title">Omnivores</div></div>
    </div>
</div>

<div id="quiz-view" class="view-section">
    <div class="quiz-container" style="color:white; text-align:center; padding:20px;">
        <h2>Quiz Area</h2>
        <p>Training features are active here.</p>
    </div>
</div>

<script>
    console.log("Noobz Soundboard Loaded");
    const dinos = { 
        herbs: ["Diablo", "Dryo", "Hypsi", "Maia", "Pachy", "Stego", "Tenno", "Trike"], 
        carns: ["Allo", "Carno", "Cerato", "Deino", "Dilo", "Herrera", "Omni", "Ptera", "Rex", "Troodon"], 
        omnis: ["Beipi", "Galli"] 
    };
    
    // UI Builder
    Object.keys(dinos).forEach(type => {
        const container = document.getElementById(type.replace('s', '') + '-container');
        dinos[type].forEach(name => {
            const card = document.createElement('div');
            card.className = 'dino-card';
            card.innerHTML = `<button class="dino-toggle">${name}</button><div class="dino-panel"><button class="call-btn" onclick="new Audio('audio/${name} 75 1 Call.mp3').play()">Call 1</button></div>`;
            card.querySelector('.dino-toggle').onclick = () => card.classList.toggle('active');
            container.appendChild(card);
        });
    });

    // Toggles & Logic
    document.getElementById('darkModeToggle').addEventListener('change', e => document.body.classList.toggle('dark-mode', e.target.checked));
    
    let party = null;
    document.getElementById('partyToggle').addEventListener('change', e => {
        if (e.target.checked) party = setInterval(() => { new Audio('audio/Rex 75 1 Call.mp3').play(); }, 1000);
        else clearInterval(party);
    });

    // Tab Lock Logic
    let isQuizActive = false;
    function switchTab(tab) {
        if (isQuizActive && tab === 'soundboard') return alert("Finish quiz first!");
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'tab-' + tab));
        document.querySelectorAll('.view-section').forEach(v => v.classList.toggle('active', v.id === tab + '-view'));
    }
    document.getElementById('tab-soundboard').onclick = () => switchTab('soundboard');
    document.getElementById('tab-quiz').onclick = () => switchTab('quiz');
</script>
</body>
</html>
